    <title>class no 15</title>
    <style>
        .row-1,
        .row-2,
        .row-3 {
            display: flex;
            flex-direction: row;
            background-color: white;
        }

        img {
            cursor: pointer;
            border: 1px solid white;
            border-radius: 20px;
        }
        img:hover {
            /* overlay the term to know */
            /* 1- position: absolute or position: fixed
        2-  top, left, right, bottom
         3- z-index
        4-  Often background-color with rgba() for transparency */
            opacity: 0.6;
            /* opacity will always be in points  */
        }

        p {
            position: relative;
            top: 50px;
            right: 170px;
            font-size: 25px;
        }
    </style>
</head>
