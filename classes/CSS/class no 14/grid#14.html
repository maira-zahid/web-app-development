<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>concept of grid</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: repeat(3,200px);
            justify-content: center;
        }
        .box{
            background-color: black;
            width: 200px;
            height: 200px;
        }
        /* function argument ,parameter  */
    </style>
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
         <div class="box">
            
        </div>
         <div class="box">
            
        </div>
    </div>
</body>
</html>
